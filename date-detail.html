<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Volume by Hour – Maine Turnpike Authority</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
        min-height: 100vh;
        padding: 32px 24px;
        color: #1b1f23;
      }
      .container { max-width: 900px; margin: 0 auto; }
      header { text-align: center; margin-bottom: 24px; }
      h1 { font-size: 1.5rem; color: #166534; margin: 0 0 8px 0; }
      .meta { font-size: 15px; font-weight: 500; color: #334155; }
      .compare-row {
        display: flex;
        align-items: flex-start;
        gap: 24px;
        margin-bottom: 20px;
        padding: 16px;
        background: rgba(255,255,255,0.7);
        border-radius: 12px;
        border: 1px solid rgba(22, 101, 52, 0.15);
      }
      .compare-dropdown-wrap {
        flex-shrink: 0;
        position: relative;
      }
      .compare-dropdown-trigger {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid rgba(22, 101, 52, 0.25);
        background: #fff;
        font-size: 13px;
        color: #334155;
        cursor: pointer;
        min-width: 180px;
      }
      .compare-dropdown-trigger::after {
        content: "▾";
        margin-left: auto;
        font-size: 10px;
        color: #64748b;
      }
      .compare-dropdown-panel {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        margin-top: 4px;
        min-width: 200px;
        max-width: 260px;
        background: #fff;
        border-radius: 8px;
        border: 1px solid rgba(22, 101, 52, 0.2);
        box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        z-index: 100;
        overflow: hidden;
      }
      .compare-dropdown-panel.is-open {
        display: block;
      }
      .compare-search {
        padding: 8px 12px;
        border: none;
        border-bottom: 1px solid rgba(22, 101, 52, 0.15);
        font-size: 13px;
        width: 100%;
        box-sizing: border-box;
      }
      .compare-search:focus {
        outline: none;
      }
      .compare-list {
        max-height: 200px;
        overflow-y: auto;
      }
      .compare-list-item {
        display: block;
        width: 100%;
        padding: 8px 12px;
        border: none;
        background: none;
        font-size: 13px;
        text-align: left;
        cursor: pointer;
        color: #334155;
      }
      .compare-list-item:hover {
        background: rgba(22, 101, 52, 0.08);
      }
      .compare-selected-wrap {
        flex: 1;
        min-width: 0;
      }
      .compare-selected-label {
        font-size: 12px;
        font-weight: 600;
        color: #64748b;
        margin-bottom: 8px;
      }
      .compare-selected-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .compare-selected-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        background: rgba(22, 128, 61, 0.15);
        border: 1px solid rgba(22, 101, 52, 0.3);
        color: #166534;
      }
      .compare-selected-chip button {
        padding: 0;
        border: none;
        background: none;
        cursor: pointer;
        color: #64748b;
        font-size: 14px;
        line-height: 1;
      }
      .compare-selected-chip button:hover {
        color: #dc2626;
      }
      .compare-hint {
        font-size: 11px;
        color: #94a3b8;
        margin-top: 4px;
      }
      .chart-wrap {
        background: #fff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 4px 20px rgba(22, 101, 52, 0.08);
        border: 1px solid rgba(22, 101, 52, 0.12);
        margin-bottom: 24px;
      }
      .chart-wrap canvas { max-height: 400px; }
      .back-link {
        display: inline-block;
        margin-top: 16px;
        padding: 10px 18px;
        background: #15803d;
        color: #fff;
        text-decoration: none;
        border-radius: 10px;
        font-weight: 600;
        font-size: 14px;
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .back-link:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(22, 101, 52, 0.3);
      }
      .no-data { text-align: center; padding: 48px 24px; color: #64748b; }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1 id="pageTitle">Volume by Hour</h1>
        <p class="meta" id="pageMeta"></p>
      </header>
      <div class="compare-row" id="compareRow" style="display: none;">
        <div class="compare-dropdown-wrap">
          <button type="button" class="compare-dropdown-trigger" id="compareDropdownTrigger">Add date to compare</button>
          <div class="compare-dropdown-panel" id="compareDropdownPanel">
            <input type="text" class="compare-search" id="compareSearch" placeholder="Search dates…" />
            <div class="compare-list" id="compareList"></div>
          </div>
          <div class="compare-hint">Ctrl+click to add</div>
        </div>
        <div class="compare-selected-wrap">
          <div class="compare-selected-label">Comparing:</div>
          <div class="compare-selected-chips" id="compareSelectedChips"></div>
        </div>
      </div>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
      <a href="#" class="back-link" id="backLink">&larr; Back to Dashboard</a>
    </div>
    <script>
      (function () {
        document.getElementById("backLink").addEventListener("click", (e) => {
          e.preventDefault();
          if (window.opener) {
            window.opener.focus();
            window.close();
          } else {
            window.location.href = "index.html";
          }
        });

        const payloadStr = localStorage.getItem("laneClosureDateDetail");
        if (!payloadStr) {
          document.getElementById("pageTitle").textContent = "No data";
          document.getElementById("pageMeta").textContent = "Open this page by clicking a date in the Lane Closure Dashboard.";
          document.querySelector(".chart-wrap").innerHTML = '<div class="no-data">No date data available. Click a date in the main dashboard to view its 24-hour volume chart.</div>';
          return;
        }

        let payload;
        try { payload = JSON.parse(payloadStr); } catch (e) { console.error(e); return; }

        const { date, dates, times, volumeByKey, location, direction, isProjection, compareDateKeys, isMonThuMax, weekMaxDatasets, monthName, availableWeeks, weekStartSunday } = payload;

        function buildTimeseries(dateKey, volMap, timeList) {
          return timeList.map((time) => ({
            time,
            volume: volMap[`${dateKey}__${time}`] ?? null,
          }));
        }

        let timeseries;
        let timeLabels;
        let availableDates = [];
        let monthMonThuDatasets = null;

        if (payload.weekMaxDatasets && payload.isMonthMonThuMax) {
          timeLabels = payload.times || [];
          monthMonThuDatasets = payload.weekMaxDatasets;
          availableDates = [];
        } else if (payload.timeseries && payload.isMonThuMax) {
          timeLabels = payload.timeseries.map((p) => p.time);
          timeseries = payload.timeseries;
          availableDates = [];
        } else if (volumeByKey && dates && times) {
          timeLabels = times;
          timeseries = buildTimeseries(date, volumeByKey, times);
          availableDates = dates.filter((d) => d !== date).sort();
        } else if (payload.timeseries) {
          timeLabels = payload.timeseries.map((p) => p.time);
          timeseries = payload.timeseries;
          availableDates = [];
        } else {
          document.querySelector(".chart-wrap").innerHTML = '<div class="no-data">Invalid data format.</div>';
          return;
        }

        const [y, m, d] = (date || "2000-01-01").split("-").map(Number);
        const displayDate = `${m}/${d}/${y}`;

        const weekDisplayDate = weekStartSunday ? (() => { const [yr, mo, day] = weekStartSunday.split("-").map(Number); return `${mo}/${day}/${yr}`; })() : displayDate;
        document.getElementById("pageTitle").textContent = monthMonThuDatasets
          ? `Volume by Hour – ${monthName || "Month"} (Mon-Thu per week)`
          : isMonThuMax
            ? `Volume by Hour – Week of ${weekDisplayDate} (Mon-Thu)`
            : `Volume by Hour – ${displayDate}`;
        document.getElementById("pageMeta").textContent = [
          location && `Location: ${location}`,
          direction && `Direction: ${direction}`,
          isProjection && "(Projected)",
        ].filter(Boolean).join(" · ");

        const hasData = monthMonThuDatasets
          ? monthMonThuDatasets.some((ds) => ds.data.some((v) => v != null))
          : timeseries.some((p) => p.volume != null);
        if (!hasData) {
          document.querySelector(".chart-wrap").innerHTML = '<div class="no-data">No volume data for this date.</div>';
          return;
        }

        function formatDateForOption(d) {
          const [yr, mo, day] = d.split("-").map(Number);
          return `${mo}/${day}/${yr}`;
        }

        function formatWeekLabel(weekStart) {
          const [yr, mo, day] = weekStart.split("-").map(Number);
          return `Week of ${mo}/${day}/${yr}`;
        }

        function buildWeekMaxData(weekStart, volMap, timeList) {
          const [yw, mw, dw] = weekStart.split("-").map(Number);
          const allDates = [];
          for (let i = 1; i <= 4; i++) {
            const d = new Date(yw, mw - 1, dw + i);
            allDates.push(`${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`);
          }
          return timeList.map((time) => {
            const vols = allDates.map((d) => volMap[`${d}__${time}`]);
            const finite = vols.filter((v) => v != null && Number.isFinite(v));
            return finite.length > 0 ? Math.max(...finite) : null;
          });
        }

        const COMPARE_COLORS = [
          { border: "#2563eb", fill: "rgba(37, 99, 235, 0.08)" },
          { border: "#dc2626", fill: "rgba(220, 38, 38, 0.08)" },
          { border: "#ca8a04", fill: "rgba(202, 138, 4, 0.08)" },
          { border: "#9333ea", fill: "rgba(147, 51, 234, 0.08)" },
          { border: "#0891b2", fill: "rgba(8, 145, 178, 0.08)" },
        ];

        const compareList = document.getElementById("compareList");
        const compareSelectedChips = document.getElementById("compareSelectedChips");
        const compareRow = document.getElementById("compareRow");
        const compareDropdownTrigger = document.getElementById("compareDropdownTrigger");
        const compareDropdownPanel = document.getElementById("compareDropdownPanel");
        const compareSearch = document.getElementById("compareSearch");
        const selectedCompareDates = new Set(monthMonThuDatasets || isMonThuMax ? [] : (Array.isArray(compareDateKeys) ? compareDateKeys : []));
        const selectedCompareWeeks = new Set();
        const availableWeeksList = Array.isArray(payload.availableWeeks) ? payload.availableWeeks : (Array.isArray(availableWeeks) ? availableWeeks : []);
        if (selectedCompareDates.size > 0 && !monthMonThuDatasets) {
          document.getElementById("pageTitle").textContent = `Volume by Hour – ${displayDate} (${selectedCompareDates.size + 1} dates)`;
        }

        function renderSelectedChips() {
          compareSelectedChips.innerHTML = "";
          const sorted = Array.from(selectedCompareDates).sort();
          if (sorted.length === 0 && selectedCompareWeeks.size === 0) {
            compareSelectedChips.textContent = (monthMonThuDatasets || isMonThuMax)
              ? "None — Ctrl+click weeks in dropdown to add"
              : "None — Ctrl+click dates in dropdown to add";
            compareSelectedChips.style.color = "#94a3b8";
            compareSelectedChips.style.fontSize = "13px";
            return;
          }
          compareSelectedChips.style.color = "";
          compareSelectedChips.style.fontSize = "";
          sorted.forEach((d) => {
            const chip = document.createElement("span");
            chip.className = "compare-selected-chip";
            chip.appendChild(document.createTextNode(formatDateForOption(d)));
            const removeBtn = document.createElement("button");
            removeBtn.textContent = " ×";
            removeBtn.type = "button";
            removeBtn.addEventListener("click", () => {
              selectedCompareDates.delete(d);
              renderSelectedChips();
              chart.data.datasets = getDatasets(Array.from(selectedCompareDates));
              chart.update();
            });
            chip.appendChild(removeBtn);
            compareSelectedChips.appendChild(chip);
          });
          Array.from(selectedCompareWeeks).sort().forEach((w) => {
            const chip = document.createElement("span");
            chip.className = "compare-selected-chip";
            chip.appendChild(document.createTextNode(formatWeekLabel(w)));
            const removeBtn = document.createElement("button");
            removeBtn.textContent = " ×";
            removeBtn.type = "button";
            removeBtn.addEventListener("click", () => {
              selectedCompareWeeks.delete(w);
              renderSelectedChips();
              chart.data.datasets = monthMonThuDatasets ? buildMonthMonThuDatasets() : getSingleWeekDatasets();
              chart.update();
            });
            chip.appendChild(removeBtn);
            compareSelectedChips.appendChild(chip);
          });
        }

        function renderCompareList(filter) {
          const q = (filter || "").trim().toLowerCase();
          compareList.innerHTML = "";
          availableDates.forEach((d) => {
            const searchText = formatDateForOption(d).toLowerCase() + " " + d;
            if (q && !searchText.includes(q)) return;
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "compare-list-item";
            btn.textContent = formatDateForOption(d);
            btn.dataset.dateKey = d;
            btn.addEventListener("click", (e) => {
              if (!e.ctrlKey && !e.metaKey) return;
              e.preventDefault();
              selectedCompareDates.add(d);
              renderSelectedChips();
              chart.data.datasets = getDatasets(Array.from(selectedCompareDates));
              chart.update();
            });
            compareList.appendChild(btn);
          });
        }

        function renderWeekList(filter) {
          const q = (filter || "").trim().toLowerCase();
          compareList.innerHTML = "";
          availableWeeksList.filter((w) => !selectedCompareWeeks.has(w)).forEach((w) => {
            const searchText = formatWeekLabel(w).toLowerCase() + " " + w;
            if (q && !searchText.includes(q)) return;
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "compare-list-item";
            btn.textContent = formatWeekLabel(w);
            btn.dataset.weekStart = w;
            btn.addEventListener("click", (e) => {
              if (!e.ctrlKey && !e.metaKey) return;
              e.preventDefault();
              selectedCompareWeeks.add(w);
              renderSelectedChips();
              chart.data.datasets = monthMonThuDatasets ? buildMonthMonThuDatasets() : getSingleWeekDatasets();
              chart.update();
            });
            compareList.appendChild(btn);
          });
        }

        if ((monthMonThuDatasets || isMonThuMax) && compareRow) {
          compareRow.style.display = "flex";
          compareDropdownTrigger.textContent = "Add week to compare";
          compareSearch.placeholder = "Search weeks…";
          renderSelectedChips();
          renderWeekList();
          if (compareDropdownTrigger && compareDropdownPanel) {
            compareDropdownTrigger.addEventListener("click", (e) => {
              e.stopPropagation();
              compareDropdownPanel.classList.toggle("is-open");
              if (compareDropdownPanel.classList.contains("is-open")) {
                compareSearch.value = "";
                renderWeekList();
                compareSearch.focus();
              }
            });
            document.addEventListener("click", () => compareDropdownPanel.classList.remove("is-open"));
            compareDropdownPanel.addEventListener("click", (e) => e.stopPropagation());
          }
          if (compareSearch) {
            compareSearch.addEventListener("input", () => renderWeekList(compareSearch.value));
          }
        } else if (availableDates.length > 0) {
          compareRow.style.display = "flex";
          renderSelectedChips();
          renderCompareList();
          if (compareDropdownTrigger && compareDropdownPanel) {
            compareDropdownTrigger.addEventListener("click", (e) => {
              e.stopPropagation();
              compareDropdownPanel.classList.toggle("is-open");
              if (compareDropdownPanel.classList.contains("is-open")) {
                compareSearch.value = "";
                renderCompareList();
                compareSearch.focus();
              }
            });
            document.addEventListener("click", () => compareDropdownPanel.classList.remove("is-open"));
            compareDropdownPanel.addEventListener("click", (e) => e.stopPropagation());
          }
          if (compareSearch) {
            compareSearch.addEventListener("input", () => renderCompareList(compareSearch.value));
          }
        }

        function getDatasets(compareDateKeys) {
          const primaryData = timeseries.map((p) => p.volume);
          const datasets = [
            {
              label: isMonThuMax ? "Mon-Thu" : displayDate,
              data: primaryData,
              borderColor: "#15803d",
              backgroundColor: "rgba(22, 128, 61, 0.1)",
              fill: true,
              tension: 0.3,
              pointBackgroundColor: "#15803d",
              pointBorderColor: "#fff",
              pointBorderWidth: 2,
              pointRadius: 5,
              pointHoverRadius: 8,
              spanGaps: false,
            },
          ];
          const keys = Array.isArray(compareDateKeys) ? compareDateKeys : (compareDateKeys ? [compareDateKeys] : []);
          keys.forEach((compareDateKey, i) => {
            if (!compareDateKey || !volumeByKey) return;
            const compareTs = buildTimeseries(compareDateKey, volumeByKey, timeLabels);
            const compareData = compareTs.map((p) => p.volume);
            const colors = COMPARE_COLORS[i % COMPARE_COLORS.length];
            datasets.push({
              label: formatDateForOption(compareDateKey),
              data: compareData,
              borderColor: colors.border,
              backgroundColor: colors.fill,
              fill: true,
              tension: 0.3,
              pointBackgroundColor: colors.border,
              pointBorderColor: "#fff",
              pointBorderWidth: 2,
              pointRadius: 5,
              pointHoverRadius: 8,
              borderDash: [5, 5],
              spanGaps: false,
            });
          });
          return datasets;
        }

        function getSingleWeekDatasets() {
          const base = [{
            label: "Mon-Thu",
            data: timeseries ? timeseries.map((p) => p.volume) : [],
            borderColor: "#15803d",
            backgroundColor: "rgba(22, 128, 61, 0.1)",
            fill: true,
            tension: 0.3,
            pointBackgroundColor: "#15803d",
            pointBorderColor: "#fff",
            pointBorderWidth: 2,
            pointRadius: 5,
            pointHoverRadius: 8,
            spanGaps: false,
          }];
          const WEEK_COLORS = [
            { border: "#2563eb", fill: "rgba(37, 99, 235, 0.08)" },
            { border: "#dc2626", fill: "rgba(220, 38, 38, 0.08)" },
            { border: "#ca8a04", fill: "rgba(202, 138, 4, 0.08)" },
            { border: "#9333ea", fill: "rgba(147, 51, 234, 0.08)" },
            { border: "#0891b2", fill: "rgba(8, 145, 178, 0.08)" },
          ];
          const added = Array.from(selectedCompareWeeks).sort().map((w, i) => {
            const data = volumeByKey ? buildWeekMaxData(w, volumeByKey, timeLabels) : [];
            const colors = WEEK_COLORS[i % WEEK_COLORS.length];
            return {
              label: formatWeekLabel(w),
              data,
              borderColor: colors.border,
              backgroundColor: colors.fill,
              fill: true,
              tension: 0.3,
              pointBackgroundColor: colors.border,
              pointBorderColor: "#fff",
              pointBorderWidth: 2,
              pointRadius: 5,
              pointHoverRadius: 8,
              borderDash: [5, 5],
              spanGaps: false,
            };
          });
          return base.concat(added);
        }

        function buildMonthMonThuDatasets() {
          const base = (monthMonThuDatasets || []).map((ds) => ({
            label: ds.label,
            data: ds.data,
            borderColor: ds.borderColor || "#15803d",
            backgroundColor: ds.backgroundColor || "rgba(22, 128, 61, 0.1)",
            fill: true,
            tension: 0.3,
            pointBackgroundColor: ds.borderColor || "#15803d",
            pointBorderColor: "#fff",
            pointBorderWidth: 2,
            pointRadius: 5,
            pointHoverRadius: 8,
            spanGaps: false,
          }));
          const WEEK_COLORS = [
            { border: "#2563eb", fill: "rgba(37, 99, 235, 0.08)" },
            { border: "#dc2626", fill: "rgba(220, 38, 38, 0.08)" },
            { border: "#ca8a04", fill: "rgba(202, 138, 4, 0.08)" },
            { border: "#9333ea", fill: "rgba(147, 51, 234, 0.08)" },
            { border: "#0891b2", fill: "rgba(8, 145, 178, 0.08)" },
          ];
          const added = Array.from(selectedCompareWeeks).sort().map((w, i) => {
            const data = volumeByKey ? buildWeekMaxData(w, volumeByKey, timeLabels) : [];
            const colors = WEEK_COLORS[i % WEEK_COLORS.length];
            return {
              label: formatWeekLabel(w),
              data,
              borderColor: colors.border,
              backgroundColor: colors.fill,
              fill: true,
              tension: 0.3,
              pointBackgroundColor: colors.border,
              pointBorderColor: "#fff",
              pointBorderWidth: 2,
              pointRadius: 5,
              pointHoverRadius: 8,
              borderDash: [5, 5],
              spanGaps: false,
            };
          });
          return base.concat(added);
        }

        const chartCtx = document.getElementById("chart").getContext("2d");
        const initialDatasets = monthMonThuDatasets
          ? buildMonthMonThuDatasets()
          : isMonThuMax
            ? getSingleWeekDatasets()
            : getDatasets(Array.from(selectedCompareDates));
        let chart = new Chart(chartCtx, {
          type: "line",
          data: { labels: timeLabels, datasets: initialDatasets },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            interaction: { mode: "index", intersect: false },
            plugins: {
              legend: { display: true, position: "top" },
              tooltip: {
                enabled: true,
                mode: "index",
                intersect: false,
                backgroundColor: "rgba(30, 41, 59, 0.95)",
                titleFont: { size: 13, weight: "600" },
                bodyFont: { size: 13 },
                padding: 12,
                callbacks: {
                  title: (items) => items[0]?.label || "",
                  label: (ctx) => {
                    const v = ctx.raw;
                    const label = ctx.dataset.label || "Volume";
                    return v != null ? `${label}: ${Number(v).toLocaleString()}` : `${label}: N/A`;
                  },
                },
              },
            },
            scales: {
              x: {
                grid: { color: "rgba(22, 101, 52, 0.08)" },
                ticks: { color: "#64748b", maxRotation: 45 },
              },
              y: {
                beginAtZero: true,
                grid: { color: "rgba(22, 101, 52, 0.08)" },
                ticks: { color: "#64748b", callback: (v) => (v >= 1000 ? v / 1000 + "k" : v) },
              },
            },
          },
        });

      })();
    </script>
  </body>
</html>
